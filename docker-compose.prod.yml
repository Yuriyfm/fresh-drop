services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fresh_drop}
      POSTGRES_USER: ${POSTGRES_USER:-fresh_drop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fresh_drop} -d ${POSTGRES_DB:-fresh_drop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      db:
        condition: service_healthy
    command: ["yarn", "db:schema"]

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      HOST: 0.0.0.0
      PORT: 4173
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "4173"

  scheduler:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_MARKETS: ${SPOTIFY_MARKETS:-US,GB,DE,FR,ES,IT,BR,MX,JP,KR,TR,IN,CA,AU,NL,SE,PL,AR,CO,ID,PH,ZA}
      SPOTIFY_INITIAL_RPS: ${SPOTIFY_INITIAL_RPS:-1}
      SPOTIFY_MAX_RPS: ${SPOTIFY_MAX_RPS:-2}
      SPOTIFY_MIN_RPS: ${SPOTIFY_MIN_RPS:-0.1}
      SPOTIFY_MAX_CONCURRENCY: ${SPOTIFY_MAX_CONCURRENCY:-1}
      SPOTIFY_RATE_INCREASE_STEP: ${SPOTIFY_RATE_INCREASE_STEP:-0.2}
      SPOTIFY_RATE_DECREASE_FACTOR: ${SPOTIFY_RATE_DECREASE_FACTOR:-0.5}
      SPOTIFY_RATE_STABLE_WINDOW_MS: ${SPOTIFY_RATE_STABLE_WINDOW_MS:-300000}
      SPOTIFY_RETRY_JITTER_MS: ${SPOTIFY_RETRY_JITTER_MS:-500}
      SPOTIFY_SEARCH_LIMIT: ${SPOTIFY_SEARCH_LIMIT:-10}
      SPOTIFY_MAX_SAFE_OFFSET: ${SPOTIFY_MAX_SAFE_OFFSET:-1000}
      SPOTIFY_SPLIT_TOTAL_THRESHOLD: ${SPOTIFY_SPLIT_TOTAL_THRESHOLD:-800}
      SPOTIFY_ARTIST_CACHE_TTL_DAYS: ${SPOTIFY_ARTIST_CACHE_TTL_DAYS:-30}
      CRAWLER_CRON_SCHEDULE: ${CRAWLER_CRON_SCHEDULE:-*/15 * * * *}
      CLEANUP_CRON_SCHEDULE: ${CLEANUP_CRON_SCHEDULE:-30 3 * * *}
      SPOTIFY_CRAWLER_BATCH_SIZE: ${SPOTIFY_CRAWLER_BATCH_SIZE:-5}
      SPOTIFY_CRAWLER_ARTIST_ALBUMS_LIMIT: ${SPOTIFY_CRAWLER_ARTIST_ALBUMS_LIMIT:-10}
      SPOTIFY_CRAWLER_ENABLE_ARTIST_EXPANSION: ${SPOTIFY_CRAWLER_ENABLE_ARTIST_EXPANSION:-false}
      SPOTIFY_CRAWLER_SEARCH_TASK_COOLDOWN_MINUTES: ${SPOTIFY_CRAWLER_SEARCH_TASK_COOLDOWN_MINUTES:-360}
      SPOTIFY_CRAWLER_SEARCH_QUERIES: ${SPOTIFY_CRAWLER_SEARCH_QUERIES:-}
      RELEASE_RETENTION_DAYS: ${RELEASE_RETENTION_DAYS:-30}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/app/docker/scheduler-entrypoint.sh"]

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      FRESH_DROP_SITE_ADDRESS: ${FRESH_DROP_SITE_ADDRESS:-:80}
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
